version: '3.8'

services:
  mailserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exim-mailserver
    hostname: ${HOSTNAME:-smtp0.example.com}
    environment:
      - TZ=${TZ:-Asia/Kolkata}
      - DOMAIN=${DOMAIN:-example.com}
      - HOSTNAME=${HOSTNAME:-smtp0.example.com}
      - EMAIL_USER=${EMAIL_USER:-info}
      - EMAIL_PASS=${EMAIL_PASS:-ChangeMe123!}
    volumes:
      - ./data/mail:/var/mail/vhosts
      - ./data/spool:/var/spool/exim4
      - ./data/log:/var/log/exim4
      - ./data/exim:/etc/exim4/dynamic
      - ./data/passwd:/etc/exim4/passwd
      - ./data/opendkim:/etc/opendkim/keys
      - ./data/ssl:/etc/exim4/ssl
      - ./data/letsencrypt:/etc/letsencrypt:ro
      - ./exim/exim4.conf:/etc/exim4/exim4.conf.template:ro
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    networks:
      - mailnet
    restart: unless-stopped

  dovecot:
    image: dovecot/dovecot:latest
    container_name: dovecot-mailserver
    hostname: ${HOSTNAME:-smtp0.example.com}
    # Root required so Dovecot can drop privileges to mail (uid 8) for Exim-owned maildirs
    user: "0:0"
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./data/mail:/srv/mail
      - ./data/passwd:/etc/dovecot/passwd:ro
      - ./data/ssl:/etc/dovecot/ssl:ro
      - ./dovecot/conf.d:/etc/dovecot/conf.d:ro
    ports:
      - "143:31143"
      - "993:31993"
      - "110:31110"
      - "995:31995"
    networks:
      - mailnet
    restart: unless-stopped
    depends_on:
      - mailserver

  db:
    image: mariadb:latest
    container_name: roundcube-db
    environment:
      - TZ=Asia/Kolkata
      - MYSQL_ROOT_PASSWORD=roundcube_root_pass
      - MYSQL_DATABASE=roundcubemail
      - MYSQL_USER=roundcube
      - MYSQL_PASSWORD=roundcube_pass
    volumes:
      - ./data/db:/var/lib/mysql
    networks:
      - mailnet
    restart: unless-stopped

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube-webmail
    environment:
      - TZ=Asia/Kolkata
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=db
      - ROUNDCUBEMAIL_DB_NAME=roundcubemail
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=roundcube_pass
    volumes:
      - ./roundcube/config.inc.php:/var/www/html/config/config.inc.php:ro
    ports:
      - "8080:80"
    networks:
      - mailnet
    restart: unless-stopped
    depends_on:
      - db
      - dovecot

  nginx-acme:
    image: nginx:alpine
    container_name: nginx-acme
    volumes:
      - ./data/certbot/www:/var/www/certbot:ro
      - ./certbot/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - mailnet
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./data/letsencrypt:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
      - ./scripts/certbot-deploy-hook.sh:/scripts/deploy-hook.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    environment:
      - TZ=Asia/Kolkata
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-info@example.com}
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-${HOSTNAME:-smtp0.example.com}}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      trap exit TERM;
      while :; do
        certbot renew --quiet --deploy-hook /scripts/deploy-hook.sh;
        sleep 12h & wait $${!};
      done
    depends_on:
      - nginx-acme
    networks:
      - mailnet
    restart: unless-stopped

  mailpanel:
    build:
      context: ./mailpanel
      dockerfile: Dockerfile
    container_name: mail-admin
    environment:
      - TZ=Asia/Kolkata
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeAdminPass!}
      - ADMIN_SECRET=${ADMIN_SECRET:-change-this-secret-in-production}
      - DATA_DIR=/data
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8000"
    networks:
      - mailnet
    restart: unless-stopped
    depends_on:
      - mailserver
      - dovecot

networks:
  mailnet:
    driver: bridge
