# Mail location and namespaces

mail_location = maildir:/var/mail/vhosts/%d/%n

namespace inbox {
  inbox = yes
  location = 
  mailbox Drafts {
    special_use = \Drafts
  }
  mailbox Junk {
    special_use = \Junk
  }
  mailbox Sent {
    special_use = \Sent
  }
  mailbox "Sent Messages" {
    special_use = \Sent
  }
  mailbox Trash {
    special_use = \Trash
  }
  prefix = 
}

mail_privileged_group = mail
mail_uid = 8
mail_gid = 8

first_valid_uid = 8
last_valid_uid = 8

maildir_copy_with_hardlinks = yes
maildir_very_dirty_syncs = no
