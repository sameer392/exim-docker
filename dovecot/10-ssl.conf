# SSL configuration
# Use 'yes' to allow both SSL and non-SSL connections
# Use 'required' to force SSL only

ssl = yes
ssl_cert = </etc/dovecot/dovecot.pem
ssl_key = </etc/dovecot/dovecot.key

ssl_min_protocol = TLSv1.2
ssl_cipher_list = ALL:!aNULL:!eNULL:!LOW:!MEDIUM:!EXP:!RC4:!MD5:!DES:!3DES:!PSK:!SRP:!DSS

ssl_prefer_server_ciphers = yes
