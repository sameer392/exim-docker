# Shared passwd-file auth — same file as Exim (/etc/dovecot/passwd)
# Format: user@domain:$1$md5hash
# MD5-CRYPT required for Exim compatibility (openssl passwd -1)

auth_allow_weak_schemes = yes

passdb passwd-file {
  default_password_scheme = MD5-CRYPT
  passwd_file_path = /etc/dovecot/passwd
}

userdb static {
  fields {
    uid = mail
    gid = mail
    home = /srv/mail/%{user | domain}/%{user | username}
  }
}
