# Match Exim Maildir layout: /srv/mail/<domain>/<user>/
# Uses mail uid/gid (8:8) — same as Exim delivery user

mail_path = /srv/mail/%{user | domain}/%{user | username}
mail_home = /srv/mail/%{user | domain}/%{user | username}
mail_uid = mail
mail_gid = mail
first_valid_uid = 8
last_valid_uid = 8
first_valid_gid = 8
last_valid_gid = 8
