# Use human-readable mailbox folder names on disk (Sent, Trash, Drafts)
# instead of Dovecot index GUID directories.
mailbox_list_layout = fs

namespace inbox {
  inbox = yes
  separator = /
  mailbox Sent {
    special_use = \Sent
    auto = subscribe
  }
  mailbox Trash {
    special_use = \Trash
    auto = subscribe
  }
  mailbox Drafts {
    special_use = \Drafts
    auto = subscribe
  }
}
