# Exim 4 configuration — dynamic runtime values in /etc/exim4/dynamic/
# domains, primary_hostname, qualify_domain, dkim_selector

primary_hostname = ${sg{${readfile{/etc/exim4/dynamic/primary_hostname}}}{\\n}{}}
domainlist local_domains = /etc/exim4/dynamic/domains
domainlist relay_to_domains =
hostlist relay_from_hosts = 127.0.0.1
qualify_domain = ${sg{${readfile{/etc/exim4/dynamic/qualify_domain}}}{\\n}{}}

# Prefer IPv4 over IPv6 to avoid network unreachable errors
dns_ipv4_lookup = true

# TLS
tls_advertise_hosts = *
tls_certificate = /etc/exim4/exim.crt
tls_privatekey = /etc/exim4/exim.key

# Listen on multiple ports
# Port 465 uses implicit TLS (SMTPS), ports 25 and 587 use STARTTLS
daemon_smtp_ports = 25 : 587
tls_on_connect_ports = 465

# ACL
acl_smtp_rcpt = acl_check_rcpt

# Main section
log_selector = +all
never_users = root
keep_environment =

# Authentication
auth_advertise_hosts = *

# Begin ACL
begin acl

acl_check_rcpt:
  accept  hosts = :
  deny    message = Restricted characters in address
          domains = +local_domains
          local_parts = ^[.] : ^.*[@%!/|]
  accept  local_parts = postmaster
          domains = +local_domains
  accept  hosts = +relay_from_hosts
  # Allow authenticated users to relay
  accept  authenticated = *
  # Allow any sender that is in the passwd file (for external SMTP services)
  # Check if sender address exists in passwd file
  accept  condition = ${if exists{/etc/exim4/passwd}{${lookup{$sender_address}lsearch{/etc/exim4/passwd}{yes}{no}}}{no}}
  require message = relay not permitted
          domains = +local_domains : +relay_to_domains
  accept

# Begin routers
begin routers

dnslookup:
  driver = dnslookup
  domains = ! +local_domains
  transport = remote_smtp
  ignore_target_hosts = 0.0.0.0 : 127.0.0.0/8
  no_more

system_aliases:
  driver = redirect
  allow_fail
  allow_defer
  data = ${lookup{$local_part}lsearch{/etc/aliases}}

localuser:
  driver = accept
  senders = lsearch{/etc/exim4/passwd}
  transport = local_delivery
  cannot_route_message = Unknown user

# Begin transports
begin transports

remote_smtp:
  driver = smtp
  dkim_domain = $sender_address_domain
  dkim_selector = ${sg{${readfile{/etc/exim4/dynamic/dkim_selector}}}{\\n}{}}
  dkim_private_key = /etc/opendkim/keys/${sender_address_domain}/${sg{${readfile{/etc/exim4/dynamic/dkim_selector}}}{\\n}{}}.private
  dkim_canon = relaxed
  dkim_strict = 0
  # TLS will use default secure ciphers (invalid cipher string removed)

local_delivery:
  driver = appendfile
  directory = /var/mail/vhosts/$domain/$local_part
  maildir_format
  delivery_date_add
  envelope_to_add
  return_path_add
  user = mail
  group = mail

# Begin retry
begin retry

*                      *           F,2h,15m; G,16h,1h,1.5; F,4d,6h

# Begin rewrite
begin rewrite

# Begin authenticators
begin authenticators

plain:
  driver = plaintext
  public_name = PLAIN
  server_condition = "${if crypteq{$auth3}{${extract{1}{:}{${lookup{$auth2}lsearch{/etc/exim4/passwd}}}}}{1}{0}}"
  server_set_id = $auth2
  server_prompts = :
  server_advertise_condition = ${if eq{$tls_cipher}{}{no}{yes}}

login:
  driver = plaintext
  public_name = LOGIN
  server_condition = "${if crypteq{$auth2}{${extract{1}{:}{${lookup{$auth1}lsearch{/etc/exim4/passwd}}}}}{1}{0}}"
  server_set_id = $auth1
  server_prompts = Username:: : Password::
  server_advertise_condition = ${if eq{$tls_cipher}{}{no}{yes}}
