# Exim 4 configuration — runtime values rendered from /etc/exim4/dynamic/ at startup
# Placeholders: @@PRIMARY_HOSTNAME@@ @@QUALIFY_DOMAIN@@ @@DKIM_SELECTOR@@

primary_hostname = @@PRIMARY_HOSTNAME@@
domainlist local_domains = /etc/exim4/dynamic/domains
domainlist relay_to_domains =
hostlist relay_from_hosts = 127.0.0.1
qualify_domain = @@QUALIFY_DOMAIN@@

# Prefer IPv4; disable IPv6 to avoid unreachable Gmail MX AAAA records
dns_ipv4_lookup = true
disable_ipv6 = true

# TLS
tls_advertise_hosts = *
tls_certificate = /etc/exim4/ssl/fullchain.pem
tls_privatekey = /etc/exim4/ssl/privkey.pem

# Listen on multiple ports
# Port 465 uses implicit TLS (SMTPS), ports 25 and 587 use STARTTLS
daemon_smtp_ports = 25 : 587
tls_on_connect_ports = 465

# ACL
acl_smtp_mail = acl_check_mail
acl_smtp_rcpt = acl_check_rcpt

# Main section
log_selector = +all
never_users = root
keep_environment =

# Authentication
auth_advertise_hosts = *

# Begin ACL
begin acl

# Reject spoofed local senders and enforce From = authenticated account.
acl_check_mail:
  accept  senders = :
  accept  hosts = +relay_from_hosts
  deny    message = Local senders must authenticate before sending mail.
          sender_domains = +local_domains
          !authenticated = *
  deny    message = Sender address must match your authenticated account.
          authenticated = *
          condition = ${if !eq{${lc:$sender_address}}{${lc:$authenticated_id}}{yes}{no}}
  accept

acl_check_rcpt:
  accept  hosts = :
  deny    message = Restricted characters in address
          domains = +local_domains
          local_parts = ^[.] : ^.*[@%!/|]
  accept  local_parts = postmaster
          domains = +local_domains
  accept  hosts = +relay_from_hosts

  # Per-account outbound rate limits (configured via admin panel)
  # Lookups must run on warn lines: ratelimit splits on "/" so paths like /etc/exim4/... break inline lookups.
  warn    set acl_c0 = ${if def:authenticated_id{$authenticated_id}{$sender_address}}
          set acl_m0 = ${lookup{$acl_c0}lsearch{/etc/exim4/dynamic/rate_10m}{50}}
          set acl_m1 = ${lookup{$acl_c0}lsearch{/etc/exim4/dynamic/rate_1h}{200}}
          set acl_m2 = ${lookup{$acl_c0}lsearch{/etc/exim4/dynamic/rate_1d}{1000}}
          condition = ${lookup{$acl_c0}lsearch{/etc/exim4/passwd}{yes}{no}}
  deny    message = Rate limit exceeded: too many messages in 10 minutes. Try again later.
          condition = ${lookup{$acl_c0}lsearch{/etc/exim4/passwd}{yes}{no}}
          ratelimit = $acl_m0 / 10m / strict / $acl_c0
  deny    message = Rate limit exceeded: too many messages in 1 hour. Try again later.
          condition = ${lookup{$acl_c0}lsearch{/etc/exim4/passwd}{yes}{no}}
          ratelimit = $acl_m1 / 1h / strict / $acl_c0
  deny    message = Rate limit exceeded: too many messages in 24 hours. Try again later.
          condition = ${lookup{$acl_c0}lsearch{/etc/exim4/passwd}{yes}{no}}
          ratelimit = $acl_m2 / 1d / strict / $acl_c0

  # Allow authenticated users to relay (MAIL ACL ensures From = authenticated_id)
  accept  authenticated = *
  deny    message = Please log in with a registered account to send mail.
          domains = ! +local_domains
          !authenticated = *
  require message = relay not permitted
          domains = +local_domains : +relay_to_domains
  accept

# Begin routers
begin routers

# Save outbound copies to sender's Sent folder (Roundcube/WHMCS/SMTP clients).
copy_sent:
  driver = redirect
  condition = ${lookup{$sender_address}lsearch{/etc/exim4/passwd}{yes}{no}}
  condition = ${if !eq{$local_part@$domain}{$sender_address}{yes}{no}}
  data = $sender_address
  unseen

sent_copy_delivery:
  driver = accept
  domains = +local_domains
  condition = ${if eq{$local_part@$domain}{$sender_address}{yes}{no}}
  condition = ${lookup{$sender_address}lsearch{/etc/exim4/passwd}{yes}{no}}
  headers_add = X-Save-Copy: sent
  transport = dovecot_lmtp

dnslookup:
  driver = dnslookup
  domains = ! +local_domains
  transport = remote_smtp
  ignore_target_hosts = 0.0.0.0 : 127.0.0.0/8
  no_more

system_aliases:
  driver = redirect
  allow_fail
  allow_defer
  data = ${lookup{$local_part}lsearch{/etc/aliases}}

localuser:
  driver = accept
  senders = lsearch{/etc/exim4/passwd}
  transport = local_delivery
  cannot_route_message = Unknown user

# Begin transports
begin transports

dovecot_lmtp:
  driver = smtp
  protocol = lmtp
  hosts = dovecot-mailserver
  port = 2525
  delivery_date_add
  envelope_to_add
  return_path_add

remote_smtp:
  driver = smtp
  dkim_domain = $sender_address_domain
  dkim_selector = @@DKIM_SELECTOR@@
  dkim_private_key = ${lookup{$sender_address_domain}lsearch{/etc/exim4/dynamic/dkim_paths}}
  dkim_canon = relaxed
  dkim_strict = 0
  # TLS will use default secure ciphers (invalid cipher string removed)

local_delivery:
  driver = appendfile
  directory = /var/mail/vhosts/$domain/$local_part
  maildir_format
  delivery_date_add
  envelope_to_add
  return_path_add
  user = mail
  group = mail

# Begin retry
begin retry

*                      *           F,2h,15m; G,16h,1h,1.5; F,4d,6h

# Begin rewrite
begin rewrite

# Begin authenticators
begin authenticators

plain:
  driver = plaintext
  public_name = PLAIN
  server_condition = "${if crypteq{$auth3}{${extract{1}{:}{${lookup{$auth2}lsearch{/etc/exim4/passwd}}}}}{1}{0}}"
  server_set_id = $auth2
  server_prompts = :
  server_advertise_condition = ${if eq{$tls_cipher}{}{no}{yes}}

login:
  driver = plaintext
  public_name = LOGIN
  server_condition = "${if crypteq{$auth2}{${extract{1}{:}{${lookup{$auth1}lsearch{/etc/exim4/passwd}}}}}{1}{0}}"
  server_set_id = $auth1
  server_prompts = Username:: : Password::
  server_advertise_condition = ${if eq{$tls_cipher}{}{no}{yes}}
